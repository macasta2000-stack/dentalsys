<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DentalSys — Sin conexión</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 32px;
    }
    .icon { font-size: 4rem; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    p { color: #94a3b8; font-size: .95rem; max-width: 400px; line-height: 1.6; }
    button {
      margin-top: 8px;
      padding: 12px 28px;
      background: #0369a1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #0284c7; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Sin conexión a internet</h1>
  <p>
    DentalSys requiere conexión a internet para funcionar.
    Verificá tu red WiFi o datos móviles y volvé a intentarlo.
  </p>
  <p style="font-size: .8rem; color: #64748b;">
    Tus datos están seguros en la nube — no se perdió ningún registro.
  </p>
  <button onclick="window.location.reload()">🔄 Reintentar</button>
</body>
</html>
